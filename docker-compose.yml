services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=spendwise
      - DB_USER=spendwise_user
      - DB_PASS=spendwise_pass

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spendwise
      MYSQL_USER: spendwise_user
      MYSQL_PASSWORD: spendwise_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./src/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data: